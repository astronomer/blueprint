name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Safety: only run for contributors with write access to the repo
    # (OWNER/MEMBER/COLLABORATOR). External and fork contributors come through as
    # CONTRIBUTOR/NONE and are skipped — and `pull_request` from a fork gets no
    # secrets anyway, so CLAUDE_CODE_OAUTH_TOKEN is never exposed to untrusted code.
    # MEMBER alone is insufficient: it only surfaces for *publicized* org membership,
    # so privately-membered org members appear as COLLABORATOR.
    if: |
      github.event.pull_request.author_association == 'OWNER' ||
      github.event.pull_request.author_association == 'MEMBER' ||
      github.event.pull_request.author_association == 'COLLABORATOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@521136812280ae7ef256e06045655b9da02793f0 # v1.0.158
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

          # Post the review back to the PR. In automated/agent mode (a custom
          # prompt with no @claude mention) the action posts nothing unless this
          # is set — Claude's output would otherwise stay in the hidden action log.
          # (use_sticky_comment does not work in agent mode for this version.)
          track_progress: true

          # Prompt for automated review (no @claude mention needed)
          prompt: |
            Please review this pull request and provide feedback on:
            - Code quality and best practices
            - Potential bugs or issues
            - Performance considerations
            - Security concerns
            - Test coverage

            Be constructive and helpful in your feedback.

          # Optional: Use sticky comments to make Claude reuse the same comment on subsequent pushes to the same PR
          # use_sticky_comment: true

          # Security: this workflow runs against attacker-controllable PR code.
          # We do NOT grant any Bash/test-execution tools — `uv run` would install
          # from the PR's pyproject.toml/uv.lock and could exfiltrate the OAuth
          # token via a malicious build backend. CI runs the same checks already.
          # We also explicitly disallow the action's default write-capable tools
          # (Edit/Write/git Bash) so an injected prompt cannot modify the PR.
          # Pass `--model` via claude_args to change the model.
          claude_args: --disallowedTools "Edit,MultiEdit,Write,Bash(git add:*),Bash(git commit:*),Bash(git push:*),Bash(git rm:*)"

          # Optional: Skip review for certain conditions
          # if: |
          #   !contains(github.event.pull_request.title, '[skip-review]') &&
          #   !contains(github.event.pull_request.title, '[WIP]')
